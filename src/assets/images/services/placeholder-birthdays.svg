<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a3040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2747;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D8C08C;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#D8C08C;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#glow)"/>
  <!-- Balloons -->
  <g opacity="0.7">
    <ellipse cx="200" cy="200" rx="35" ry="45" fill="#D8C08C" opacity="0.6"/>
    <line x1="200" y1="245" x2="200" y2="350" stroke="#D8C08C" stroke-width="1" opacity="0.3"/>
    <ellipse cx="260" cy="170" rx="30" ry="40" fill="#c4aa6e" opacity="0.5"/>
    <line x1="260" y1="210" x2="260" y2="340" stroke="#c4aa6e" stroke-width="1" opacity="0.3"/>
    <ellipse cx="150" cy="240" rx="28" ry="38" fill="#D8C08C" opacity="0.4"/>
    <line x1="150" y1="278" x2="150" y2="380" stroke="#D8C08C" stroke-width="1" opacity="0.3"/>
    <ellipse cx="950" cy="190" rx="32" ry="42" fill="#D8C08C" opacity="0.5"/>
    <line x1="950" y1="232" x2="950" y2="340" stroke="#D8C08C" stroke-width="1" opacity="0.3"/>
    <ellipse cx="1010" cy="220" rx="28" ry="36" fill="#c4aa6e" opacity="0.6"/>
    <line x1="1010" y1="256" x2="1010" y2="360" stroke="#c4aa6e" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Main table -->
  <ellipse cx="600" cy="600" rx="250" ry="60" fill="#1a2747" stroke="#D8C08C" stroke-width="1.5" opacity="0.6"/>
  <!-- Table decorations -->
  <rect x="570" y="540" width="60" height="60" rx="6" fill="#2a3f56" stroke="#D8C08C" stroke-width="0.5" opacity="0.5"/>
  <!-- Cake silhouette -->
  <rect x="580" y="500" width="40" height="40" rx="4" fill="#D8C08C" opacity="0.25"/>
  <rect x="575" y="480" width="50" height="25" rx="4" fill="#D8C08C" opacity="0.2"/>
  <rect x="570" y="465" width="60" height="20" rx="4" fill="#D8C08C" opacity="0.15"/>
  <!-- Confetti -->
  <rect x="350" y="120" width="8" height="8" rx="1" fill="#D8C08C" opacity="0.4" transform="rotate(30 354 124)"/>
  <rect x="500" y="100" width="6" height="6" rx="1" fill="#c4aa6e" opacity="0.3" transform="rotate(45 503 103)"/>
  <rect x="700" y="130" width="7" height="7" rx="1" fill="#D8C08C" opacity="0.35" transform="rotate(60 703 133)"/>
  <rect x="850" y="110" width="8" height="8" rx="1" fill="#c4aa6e" opacity="0.4" transform="rotate(15 854 114)"/>
  <rect x="400" y="80" width="5" height="5" rx="1" fill="#D8C08C" opacity="0.3" transform="rotate(75 402 82)"/>
  <rect x="780" y="90" width="6" height="6" rx="1" fill="#D8C08C" opacity="0.25" transform="rotate(40 783 93)"/>
  <!-- Side tables -->
  <ellipse cx="250" cy="650" rx="100" ry="25" fill="#1a2747" stroke="#D8C08C" stroke-width="0.5" opacity="0.4"/>
  <ellipse cx="950" cy="650" rx="100" ry="25" fill="#1a2747" stroke="#D8C08C" stroke-width="0.5" opacity="0.4"/>
  <!-- Placeholder label -->
  <text x="600" y="820" text-anchor="middle" fill="#D8C08C" font-family="Georgia, serif" font-size="18" opacity="0.5">PLACEHOLDER — Birthday Celebration Setup</text>
</svg>