<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111E3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2747;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stage" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#33456B;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#111E3C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <!-- Stage area -->
  <rect x="200" y="150" width="800" height="300" rx="8" fill="url(#stage)" stroke="#D8C08C" stroke-width="1" opacity="0.6"/>
  <!-- Stage screen -->
  <rect x="350" y="180" width="500" height="200" rx="4" fill="#0a1628" stroke="#D8C08C" stroke-width="0.5" opacity="0.8"/>
  <!-- Screen content lines -->
  <rect x="420" y="230" width="360" height="8" rx="4" fill="#D8C08C" opacity="0.3"/>
  <rect x="460" y="260" width="280" height="6" rx="3" fill="#D8C08C" opacity="0.2"/>
  <rect x="480" y="285" width="240" height="6" rx="3" fill="#D8C08C" opacity="0.15"/>
  <!-- Podium -->
  <rect x="560" y="380" width="80" height="70" rx="4" fill="#1a2747" stroke="#D8C08C" stroke-width="1" opacity="0.7"/>
  <!-- Seating rows -->
  <g opacity="0.4">
    <rect x="150" y="520" width="900" height="20" rx="4" fill="#33456B"/>
    <rect x="170" y="560" width="860" height="20" rx="4" fill="#33456B"/>
    <rect x="190" y="600" width="820" height="20" rx="4" fill="#33456B"/>
    <rect x="210" y="640" width="780" height="20" rx="4" fill="#33456B"/>
    <rect x="230" y="680" width="740" height="20" rx="4" fill="#33456B"/>
  </g>
  <!-- Stage lights -->
  <circle cx="300" cy="140" r="4" fill="#D8C08C" opacity="0.8"/>
  <circle cx="600" cy="130" r="5" fill="#D8C08C" opacity="0.9"/>
  <circle cx="900" cy="140" r="4" fill="#D8C08C" opacity="0.8"/>
  <!-- Ambient glow -->
  <ellipse cx="600" cy="300" rx="400" ry="200" fill="#D8C08C" opacity="0.04"/>
  <!-- Placeholder label -->
  <text x="600" y="820" text-anchor="middle" fill="#D8C08C" font-family="Georgia, serif" font-size="18" opacity="0.5">PLACEHOLDER — Corporate Conference Hall</text>
</svg>