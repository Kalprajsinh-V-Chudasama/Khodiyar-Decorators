    <circle cx="250" cy="515" r="14"/>
    <rect x="239" y="529" width="22" height="55" rx="8"/>
    <circle cx="400" cy="525" r="13"/>
    <rect x="389" y="538" width="22" height="48" rx="8"/>
    <circle cx="450" cy="518" r="15"/>
    <rect x="438" y="533" width="24" height="52" rx="8"/>
    <circle cx="600" cy="520" r="14"/>
    <rect x="589" y="534" width="22" height="50" rx="8"/>
    <circle cx="750" cy="522" r="13"/>
    <rect x="739" y="535" width="22" height="50" rx="8"/>
    <circle cx="800" cy="516" r="15"/>
    <rect x="788" y="531" width="24" height="54" rx="8"/>
    <circle cx="950" cy="520" r="14"/>
    <rect x="939" y="534" width="22" height="50" rx="8"/>
    <circle cx="1000" cy="525" r="13"/>
    <rect x="989" y="538" width="22" height="48" rx="8"/>
