  <!-- Catering stations -->
  <rect x="100" y="600" width="300" height="15" rx="4" fill="#33456B" opacity="0.4"/>
  <rect x="800" y="600" width="300" height="15" rx="4" fill="#33456B" opacity="0.4"/>
  <!-- Food items on stations -->
  <circle cx="180" cy="595" r="12" fill="#D8C08C" opacity="0.2"/>
