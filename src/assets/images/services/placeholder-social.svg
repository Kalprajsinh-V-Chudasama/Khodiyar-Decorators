<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2747;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111E3C;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="skyglow" cx="50%" cy="20%" r="60%">
      <stop offset="0%" style="stop-color:#33456B;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#111E3C;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#skyglow)"/>
