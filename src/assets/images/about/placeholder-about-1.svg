<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D8C08C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4aa6e;stop-opacity:1" />
