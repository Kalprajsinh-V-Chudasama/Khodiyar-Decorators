<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#33456B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111E3C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Event setup scene -->
  <rect x="100" y="350" width="600" height="200" rx="8" fill="#1a2747" opacity="0.6"/>
  <!-- Tables -->
  <ellipse cx="250" cy="400" rx="80" ry="20" fill="#1a2747" stroke="#D8C08C" stroke-width="0.8" opacity="0.5"/>
  <ellipse cx="450" cy="420" rx="90" ry="22" fill="#1a2747" stroke="#D8C08C" stroke-width="0.8" opacity="0.4"/>
  <ellipse cx="650" cy="400" rx="80" ry="20" fill="#1a2747" stroke="#D8C08C" stroke-width="0.8" opacity="0.5"/>
  <!-- Decorative elements -->
  <circle cx="400" cy="200" r="60" fill="#D8C08C" opacity="0.06"/>
  <circle cx="400" cy="200" r="40" fill="#D8C08C" opacity="0.08"/>
  <!-- Star/sparkle -->
  <text x="400" y="210" text-anchor="middle" font-size="48" fill="#D8C08C" opacity="0.4">✨</text>
</svg>